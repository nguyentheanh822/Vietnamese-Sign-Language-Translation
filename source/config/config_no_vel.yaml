# config/config_no_vel.yaml
# Cau hinh Ablation w/o velocity features

data:
  base_dir: "/workspace/yhnn/VSL_GH"
  keypoints_dir: "data/keypoints"
  annotations_dir: "data/annotations"
  splits_dir: "data/splits"
  gloss_vocab: "data/gloss_vocab.txt"
  dataset_json: "data/dataset.json"

  # Keypoint dimensions: (Pose25 + Face70 + Hand21x2) * 3 coords = 411
  # NO VELOCITY -> input_dim = 411
  input_dim: 411
  use_face: True
  use_velocity: False
  
  max_seq_len: 300          # Max frames per video (30fps x 10s)
  max_gloss_len: 20         # Max glosses per sentence
  max_trans_len: 30         # Max tokens in Vietnamese translation

model:
  d_model: 512
  nhead: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.1
  activation: "relu"

training:
  epochs: 150
  batch_size: 4             # Match the config_no_face for consistency
  accumulation_steps: 4
  learning_rate: 5.0e-5
  lr_warmup_steps: 1000
  weight_decay: 1.0e-3
  clip_grad_norm: 1.0
  ctc_weight: 0.3
  ce_weight: 0.7
  gpus: [0, 1]
  num_workers: 4
  save_dir: "results/run_no_vel"
  save_every: 5
  patience: 30

evaluation:
  beam_size: 4
  max_decode_len: 30

augmentation:
  flip_prob: 0.5
  speed_factor: [0.6, 1.4]
  noise_std: 0.02
  rotation_deg: 20
  scale_factor: [0.85, 1.15]
